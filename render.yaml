services:
  - type: web
    name: medmkp-medusa
    runtime: node
    repo: https://github.com/medmkp/medmkp
    branch: main
    rootDir: medusa-backend/apps/backend
    plan: starter
    buildCommand: npm install --include=dev --no-audit --no-fund --loglevel=info --foreground-scripts && npm run build
    preDeployCommand: npm run db:migrate
    startCommand: npm start
    healthCheckPath: /medmkp/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MEDUSA_ADMIN_ONBOARDING_TYPE
        value: default
      - key: DATABASE_URL
        fromDatabase:
          name: medmkp-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: medmkp-redis
          type: keyvalue
          property: connectionString
      - key: STORE_CORS
        value: https://medmkp.com,https://medmkp-demo.vercel.app,http://localhost:3000,http://localhost:3001
      - key: ADMIN_CORS
        value: https://medmkp.com,https://medmkp-medusa.onrender.com,https://medmkp-demo.vercel.app,http://localhost:9000,http://localhost:3000,http://localhost:3001
      - key: AUTH_CORS
        value: https://medmkp.com,https://medmkp-medusa.onrender.com,https://medmkp-demo.vercel.app,http://localhost:9000,http://localhost:3000,http://localhost:3001
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: AUTH_MFA_ENCRYPTION_KEY
        generateValue: true
  - type: keyvalue
    name: medmkp-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: medmkp-postgres
    plan: basic-256mb
    databaseName: medmkp_medusa
    user: medmkp
    postgresMajorVersion: "16"
