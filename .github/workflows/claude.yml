name: Claude Code

# On-demand assistant: mention @claude in an issue, a PR comment, or a PR review
# and Claude Code runs on a GitHub-hosted runner with the repo checked out. On a
# PR it commits straight back to that PR's branch; on an issue it opens a PR.
# Reactive only — there is no schedule:, so it never runs autonomously.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Only spin up a runner when someone actually mentions @claude.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write       # commit to PR branches / push fix branches
      pull-requests: write  # open PRs, comment, review
      issues: write         # comment on / update issues
      id-token: write       # OIDC (auth)
      actions: read         # read CI results to reason about failures
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          # Bills against the Claude Max subscription, not metered API.
          # Generate with `claude setup-token`; store as a repo secret.
          # Long-lived but not permanent — regenerate + update the secret when it expires.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
