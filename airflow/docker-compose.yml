# Airflow for MedMKP supplier ingestion (NUC / single-host deployment).
#
# From the repo's airflow/ directory:
#
#   docker compose up -d --build
#   docker compose exec airflow cat standalone_admin_password.txt   # UI login (admin)
#
# Backend npm deps are installed automatically by the backend-deps init service
# on every `up`. One-time, deliberate setup (writes to the production DB, and
# re-running it replaces the listed supplier rows):
#
#   docker compose exec airflow bash -c "cd /opt/medmkp/medusa-backend/apps/backend \
#     && npm run supplier:seed-usable -- ./data/supplier-vetting/sky-shasta-catalog-sources.json"
#
# The repo is bind-mounted at /opt/medmkp; the backend .env (DATABASE_URL,
# DB_SSL=true for Render Postgres) lives in the mounted checkout. Flip
# AIRFLOW_VAR_MEDMKP_SUPPLIER_INGEST_COMMIT to "true" once dry runs look good.
#
# Containers run as AIRFLOW_UID (default 1000, the checkout owner) with GID 0
# so they can write to the bind mount. If the checkout is owned by another
# user, run: echo "AIRFLOW_UID=$(id -u)" > .env

services:
  airflow-db:
    image: postgres:16-alpine
    container_name: medmkp-airflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - medmkp-airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend-deps:
    build: .
    container_name: medmkp-airflow-backend-deps
    restart: "no"
    # Run as the host user so npm can write node_modules into the bind mount.
    user: "${AIRFLOW_UID:-1000}:0"
    working_dir: /opt/medmkp/medusa-backend/apps/backend
    entrypoint: ["bash", "-c", "npm install"]
    environment:
      # The bind-mount UID has no passwd entry in the image; give npm a
      # writable cache/home instead of the default "/".
      HOME: /tmp
    volumes:
      - ..:/opt/medmkp

  airflow:
    build: .
    container_name: medmkp-airflow
    restart: unless-stopped
    # Leave CPU and memory headroom for the host: standalone runs the
    # scheduler, webserver, and ingestion tasks in this one container.
    cpus: 3.0
    mem_limit: 4g
    # Same UID as the host checkout owner; GID 0 keeps the Airflow image's
    # group-writable dirs (AIRFLOW_HOME, logs) usable for a non-50000 user.
    user: "${AIRFLOW_UID:-1000}:0"
    depends_on:
      airflow-db:
        condition: service_healthy
      backend-deps:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /opt/medmkp/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DEFAULT_TIMEZONE: America/Los_Angeles
      # Small-host trims: the webserver defaults to 4 gunicorn workers and the
      # scheduler to 2 DAG parsing processes — halve both.
      AIRFLOW__WEBSERVER__WORKERS: "2"
      AIRFLOW__SCHEDULER__PARSING_PROCESSES: "1"
      AIRFLOW_VAR_MEDMKP_BACKEND_DIR: /opt/medmkp/medusa-backend/apps/backend
      AIRFLOW_VAR_MEDMKP_SUPPLIER_INGEST_COMMIT: "true"
      # The DAG defaults NODE_OPTIONS to an 8GB heap cap; keep ingestion tasks
      # within reach of a small host (the DAG runs up to 3 suppliers at once).
      NODE_OPTIONS: --max-old-space-size=2048
    volumes:
      - ..:/opt/medmkp
      - medmkp-airflow-logs:/opt/airflow/logs
    command: standalone

volumes:
  medmkp-airflow-db-data:
  medmkp-airflow-logs:
